<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Panel de Administración</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      background-image: url("fondo.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed; /* efecto moderno */
      background-repeat: no-repeat;
    }

    nav {
      background: white;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      padding: 8px 15px;
      border-radius: 8px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #4facfe;
      color: white;
    }

    nav a.activo {
      background: #4facfe;
      color: white;
    }

    h2, h3 {
      text-align: center;
      color: white;
    }

    .contenedor {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #00c6ff;
    }

    .item {
      border-bottom: 1px solid #ddd;
      padding: 10px 5px;
      position: relative;
    }

    .eliminar {
      position: top;
      right: 5px;
      top: 10px;
      background: red;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      padding: 3px 8px;
    }

    .eliminar:hover {
      background: darkred;
    }

    select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 // FIREBASE CONFIG
 const firebaseConfig = {
  apiKey: "AIzaSyDTxUtqXNOJnRaevn06x4VaBO_YSL32FNQ",
  authDomain: "fundacionpositiva-45a7c.firebaseapp.com",
  projectId: "fundacionpositiva-45a7c",
  storageBucket: "fundacionpositiva-45a7c.firebasestorage.app",
  messaginSenderId: "991476563880",
  appId: "1:991476563880:web:0f2c5d269f0da135f7279d",
 };

  const app = initialzeApp(firebaseConfig);
  const db = getFirestore(app);

  // Convertir imagen
  function convertirImagen(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }

  // Guardar en Firebase
  document.getElementById("btnGuardar").addEventListener("click", async() => {

    const nombre = document.getElementById("nombre").value.trim();
    const apellido = document.getElementById("apellido").value.trim();
    const ocupacion = document.getElementById("ocupacion").value.trim();
    const localidad = document.getElementById("localidad").value.trim();
    const region = document.getElementById("region").value.trim();
    const archivo = document.getElementById("foto").files[0];

    if (!nombre || !apellido || !localidad || !region) {
      alert("Completa los campos obligatorios");
      return;
    }

    let fotoBase64 = "";

    if (archivo && archivo.size <= 500000) {
      fotoBase64 = await convertirImagen(archivo);
    }

    // Obtener Coordenadas
    let lat = -35;
    let lng = -71;

    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${localidad}, Chile`);
      const data = await res.json();

      if (data.length > 0) {
        lat = parseFloat(data[0].lat);
        lng = parseFloat(data[0].lon);
      }
    } catch (e) {
      console.warn("No se pudo geolocalizar");
    }

    // Guardar en Firebase
    await addDoc(collection(db, "personas"), {
      nombre,
      apellido,
      ocupacion,
      localidad,
      region,
      foto: fotoBase64,
      lat,
      lng,
      fecha: new Date()      
    });

    alert("Guardado en la nube ✔");

    limpiar();
  });

  // Limpiar
  function limpiar() {
    document.getElementById("nombre").value = "";
    document.getElementById("apellido").value = "";
    document.getElementById("ocupacion").value = "";
    document.getElementById("localidad").value = "";
    document.getElementById("region").value = "";
    document.getElementById("foto").value = "";
  }
  
</script>

<div class="contenedor">

  <h2>Panel de Administración</h2>

  <div class="card">
    <input id="nombre" placeholder="Nombre">
    <input id="apellido" placeholder="Apellido">
    <input id="ocupacion" placeholder="Ocupación">
    <select id="region">
      <option value="">Selecciona Región</option>
    </select>

    <select id="localidad">
      <option value="">Selecciona Comuna</option>
    </select>

    <input type="file" id="foto" accept="image/*">

    <button id="btnGuardar">Guardar</button>
  </div>

  <h3>Personas registradas</h3>

  <div id="lista" class="card"></div>

</div>

<script>

  "Los Ríos": ["Valdivia","Corral","Lanco","Los Lagos","Máfil","Mariquina","Paillaco","Panguipulli","La Unión","Futrono","Lago Ranco","Río Bueno"],

const selectRegion = document.getElementById("region");
const selectComuna = document.getElementById("localidad");

// Cargar Regiones
for (let region in regiones) {
  const option = document.createElement("option");
  option.value = region;
  option.textContent = region;
  selectRegion.appendChild(option);
}

selectRegion.addEventListener("change", () => {
  const regionSeleccionada = selectRegion.value;

  selectComuna.innerHTML = '<option value="">Selecciona Comuna</option';

    if (regiones[regionSeleccionada]) {
      regiones[regionSeleccionada].forEach(comuna => {
        const option = document.createElement("option");
        option.value = comuna;
        option.textContent = comuna;
        selectComuna.appendChild(option);
      });
    }
});

// 🖼️ Convertir imagen
function convertirImagen(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}

// 💾 GUARDAR
document.getElementById("btnGuardar").addEventListener("click", async () => {
  try {
    const nombre = document.getElementById("nombre").value.trim();
    const apellido = document.getElementById("apellido").value.trim();
    const ocupacion = document.getElementById("ocupacion").value.trim();
    const localidad = document.getElementById("localidad").value.trim();
    const region = document.getElementById("region").value.trim();
    const archivo = document.getElementById("foto").files[0];

    if (!nombre || !apellido || !localidad || !region) {
      alert("Completa los campos obligatorios");
      return;
    }

    let fotoBase64 = "";

    // 🔴 CONTROL DE TAMAÑO (CLAVE)
    if (archivo) {
      if (archivo.size > 500000) { // 500KB
        alert("La imagen es muy pesada (máx 500KB). Se guardará sin imagen.");
      } else {
        try {
          fotoBase64 = await convertirImagen(archivo);
        } catch (e) {
          console.error("Error imagen:", e);
          alert("Error al procesar la imagen");
        }
      }
    }

    const persona = {
      nombre,
      apellido,
      ocupacion,
      localidad,
      region,
      foto: fotoBase64
    };
    
    try {
      await addDoc(collection(db, "personas"), persona);
    } catch (e) {
      console.error("Error storage:", e);
      alert("Memoria llena. No se pudo guardar.");
      return;
    }

    alert("Datos guardados ✔");

    limpiar();
    
  } catch (error) {
    console.error("Error general:", error);
    alert("Error al guardar");
  }
});

// 📋 LISTA
function mostrarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (datos.length === 0) {
    lista.innerHTML = "<p>No hay registros</p>";
    return;
  }

  datos.forEach((p, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${p.nombre} ${p.apellido}</b><br>
      ${p.ocupacion || "Sin ocupación"}<br>
      ${p.localidad} - ${p.region}
    `;

    const btn = document.createElement("button");
    btn.textContent = "❌";
    btn.className = "eliminar";
    btn.onclick = () => eliminar(index);

    div.appendChild(btn);
    lista.appendChild(div);
  });
}

// ❌ ELIMINAR
function eliminar(index) {
  if (confirm("¿Eliminar este registro?")) {
    datos.splice(index, 1);
    mostrarLista();
  }
}

// 🧹 LIMPIAR
function limpiar() {
  document.getElementById("nombre").value = "";
  document.getElementById("apellido").value = "";
  document.getElementById("ocupacion").value = "";
  document.getElementById("localidad").value = "";
  document.getElementById("region").value = "";
  document.getElementById("foto").value = "";
}

// 🚀 INIT
mostrarLista();
</script>
